stages:
  - test
  - review
  - secret-detection

# --- Security scanning (existing) ---
sast:
  stage: test
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
variables:
  SECRET_DETECTION_ENABLED: 'true'
secret_detection:
  stage: secret-detection

# --- AI Code Review ---
ai-code-review:
  stage: review
  image: node:20-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_MERGE_REQUEST_IID
  variables:
    PLATFORM: gitlab
    # --- REQUIRED CI/CD VARIABLES (Settings > CI/CD > Variables) ---
    # GITLAB_TOKEN: Set a GitLab PAT or Project Access Token with 'api' scope.
    #                CI_JOB_TOKEN alone has limited API access and cannot read MRs.
    #                The tool uses GITLAB_TOKEN before falling back to CI_JOB_TOKEN.
    #
    # LLM API Key: Set the provider-specific API key (e.g. NVIDIA_API_KEY, GEMINI_API_KEY,
    #              OPENAI_API_KEY, or ANTHROPIC_API_KEY).
    #
    # LLM Provider
    LLM_PROVIDER: nvidia
    # LLM_TEMPERATURE: '0.2'
    # LLM_MAX_TOKENS: '8192'
    # REVIEW_MAX_FILES: '50'
    # REVIEW_MAX_DIFF_SIZE: '100000'
    # REVIEW_POST_AS_COMMENT: 'true'
    # REVIEW_FAIL_ON_CRITICAL: 'false'
    # VIBE_REVIEW: '1'              # Uncomment to auto-apply fixes
    # VIBE_REVIEW_PROMPT: ''        # Optional: custom prompt string or file path
  before_script:
    - apt-get update && apt-get install -y git
  script:
    - npm ci && npm run build
    - node dist/cli.js --mode pr --platform gitlab --mr $CI_MERGE_REQUEST_IID
  artifacts:
    reports:
      dotenv: review-result.env
    when: always
